<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rift Runner</title>
    <link rel="stylesheet" href="/rift/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hud" aria-label="Game status">
        <a class="back-link" href="/" aria-label="Back to playground">Back</a>
        <div class="meter">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="meter">
          <span>Best</span>
          <strong id="best">0</strong>
        </div>
        <div class="meter">
          <span>Shield</span>
          <strong id="shield">100%</strong>
        </div>
        <button type="button" id="pause-button">Start</button>
      </section>

      <canvas id="game" width="1280" height="720" aria-label="Rift Runner game canvas"></canvas>

      <section class="touch-pad" aria-label="Touch controls">
        <button type="button" data-dir="left" aria-label="Move left">Left</button>
        <button type="button" data-dir="up" aria-label="Move up">Up</button>
        <button type="button" data-dir="down" aria-label="Move down">Down</button>
        <button type="button" data-dir="right" aria-label="Move right">Right</button>
      </section>
    </main>

    <script type="module" src="/rift/app.js"></script>
  </body>
</html>
