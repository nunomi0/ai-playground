<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Playground</p>
        <h1>Pick a project.</h1>

          new projects land.
        </p>
      </section>

      <section class="grid">
        <a class="card" href="/snake">
          <span class="tag">Live</span>
          <strong>Snake</strong>
          <p>Classic grid-based Snake with keyboard controls and restart flow.</p>
        </a>

        <a class="card" href="/postcards">
          <span class="tag">Live</span>
          <strong>어디론가</strong>
          <p>다섯 장의 엽서로 흘러가는 스크롤 스토리. 봉투를 열고 시작해 보세요.</p>
        </a>
      </section>
    </main>
  </body>
</html>
